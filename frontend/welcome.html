<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Lung Cancer Diagnosis</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-blue-100 via-white to-blue-200 min-h-screen flex items-center justify-center">

<div class="bg-white shadow-2xl rounded-3xl p-10 text-center max-w-2xl w-full">

<h1 class="text-4xl font-bold text-gray-800 mb-4">
Smart Lung Cancer Diagnosis System
</h1>

<p class="text-gray-600 mb-8">
Upload Lung CT scans to detect cancer type using deep learning, visualize affected regions using Grad-CAM, and estimate cancer stage automatically.
</p>

<div class="flex justify-center">

<a href="/analyze"
class="bg-blue-600 text-white px-6 py-3 rounded-full hover:bg-blue-700 transition">
Start Analysis
</a>

</div>

</div>

</body>
</html>
